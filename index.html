<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FlagQuest</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    min-height:100vh;
    background:linear-gradient(135deg,#0f172a,#1e3a8a);
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.container{
    width:100%;
    max-width:700px;
    background:white;
    border-radius:20px;
    padding:30px;
    text-align:center;
    box-shadow:0 15px 40px rgba(0,0,0,.25);
}

h1{
    color:#1e3a8a;
    margin-bottom:10px;
}

.subtitle{
    color:#666;
    margin-bottom:20px;
}

.flag{
    width:280px;
    max-width:100%;
    height:180px;
    object-fit:cover;
    border:2px solid #ddd;
    border-radius:12px;
    margin:20px auto;
    display:block;
}

.options{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:12px;
    margin-top:20px;
}

.option{
    padding:14px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    font-size:16px;
    background:#eef2ff;
    transition:.2s;
}

.option:hover{
    background:#dbe4ff;
}

.correct{
    background:#22c55e !important;
    color:white;
}

.wrong{
    background:#ef4444 !important;
    color:white;
}

.next-btn{
    margin-top:20px;
    padding:12px 24px;
    border:none;
    border-radius:10px;
    background:#1e3a8a;
    color:white;
    cursor:pointer;
    display:none;
}

.next-btn:hover{
    background:#172554;
}

.stats{
    display:flex;
    justify-content:space-between;
    margin-top:20px;
    font-weight:bold;
}

@media(max-width:600px){
    .options{
        grid-template-columns:1fr;
    }

    .flag{
        height:150px;
    }
}
</style>
</head>
<body>

<div class="container">

    <h1>🌍 FlagQuest</h1>
    <p class="subtitle">Guess the Country from its Flag</p>

    <img id="flag" class="flag" alt="Country Flag">

    <div id="options" class="options"></div>

    <button id="nextBtn" class="next-btn">
        Next Question
    </button>

    <div class="stats">
        <span>Score: <span id="score">0</span></span>
        <span>Remaining: <span id="remaining">30</span></span>
    </div>

</div>

<script>

const countries = [
{ name:"France", flag:"https://flagcdn.com/w320/fr.png" },
{ name:"Germany", flag:"https://flagcdn.com/w320/de.png" },
{ name:"Japan", flag:"https://flagcdn.com/w320/jp.png" },
{ name:"Brazil", flag:"https://flagcdn.com/w320/br.png" },
{ name:"Canada", flag:"https://flagcdn.com/w320/ca.png" },
{ name:"India", flag:"https://flagcdn.com/w320/in.png" },
{ name:"Italy", flag:"https://flagcdn.com/w320/it.png" },
{ name:"United Kingdom", flag:"https://flagcdn.com/w320/gb.png" },
{ name:"Australia", flag:"https://flagcdn.com/w320/au.png" },
{ name:"Mexico", flag:"https://flagcdn.com/w320/mx.png" },

{ name:"United States", flag:"https://flagcdn.com/w320/us.png" },
{ name:"China", flag:"https://flagcdn.com/w320/cn.png" },
{ name:"South Korea", flag:"https://flagcdn.com/w320/kr.png" },
{ name:"Spain", flag:"https://flagcdn.com/w320/es.png" },
{ name:"Portugal", flag:"https://flagcdn.com/w320/pt.png" },
{ name:"Argentina", flag:"https://flagcdn.com/w320/ar.png" },
{ name:"Chile", flag:"https://flagcdn.com/w320/cl.png" },
{ name:"Colombia", flag:"https://flagcdn.com/w320/co.png" },
{ name:"Peru", flag:"https://flagcdn.com/w320/pe.png" },
{ name:"Netherlands", flag:"https://flagcdn.com/w320/nl.png" },

{ name:"Belgium", flag:"https://flagcdn.com/w320/be.png" },
{ name:"Sweden", flag:"https://flagcdn.com/w320/se.png" },
{ name:"Norway", flag:"https://flagcdn.com/w320/no.png" },
{ name:"Denmark", flag:"https://flagcdn.com/w320/dk.png" },
{ name:"Finland", flag:"https://flagcdn.com/w320/fi.png" },
{ name:"Switzerland", flag:"https://flagcdn.com/w320/ch.png" },
{ name:"Austria", flag:"https://flagcdn.com/w320/at.png" },
{ name:"Poland", flag:"https://flagcdn.com/w320/pl.png" },
{ name:"Turkey", flag:"https://flagcdn.com/w320/tr.png" },
{ name:"South Africa", flag:"https://flagcdn.com/w320/za.png" }
];

const flagImg = document.getElementById("flag");
const optionsDiv = document.getElementById("options");
const nextBtn = document.getElementById("nextBtn");
const scoreEl = document.getElementById("score");
const remainingEl = document.getElementById("remaining");

let score = 0;
let currentAnswer = "";
let remainingCountries = [];

function shuffle(array){
    const arr = [...array];

    for(let i = arr.length - 1; i > 0; i--){
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
    }

    return arr;
}

function startGame(){
    score = 0;
    scoreEl.textContent = score;

    remainingCountries = shuffle(countries);

    loadQuestion();
}

function loadQuestion(){

    if(remainingCountries.length === 0){

        const playAgain = confirm(
            `🎉 Quiz Complete!\n\nScore: ${score}/${countries.length}\n\nPlay Again?`
        );

        if(playAgain){
            startGame();
        }

        return;
    }

    remainingEl.textContent = remainingCountries.length;

    nextBtn.style.display = "none";
    optionsDiv.innerHTML = "";

    const selected = remainingCountries.pop();

    currentAnswer = selected.name;
    flagImg.src = selected.flag;

    let choices = [selected.name];

    const wrongChoices = shuffle(
        countries.filter(c => c.name !== selected.name)
    )
    .slice(0,3)
    .map(c => c.name);

    choices.push(...wrongChoices);
    choices = shuffle(choices);

    choices.forEach(choice => {

        const btn = document.createElement("button");

        btn.className = "option";
        btn.textContent = choice;

        btn.addEventListener("click", () => {

            document.querySelectorAll(".option")
            .forEach(button => button.disabled = true);

            if(choice === currentAnswer){

                btn.classList.add("correct");

                score++;
                scoreEl.textContent = score;

            } else {

                btn.classList.add("wrong");

                document.querySelectorAll(".option")
                .forEach(button => {

                    if(button.textContent === currentAnswer){
                        button.classList.add("correct");
                    }

                });
            }

            nextBtn.style.display = "inline-block";
        });

        optionsDiv.appendChild(btn);

    });
}

nextBtn.addEventListener("click", loadQuestion);

startGame();

</script>

</body>
</html>
